name: Bug Report
description: 报告一个 Bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢你提交 Bug 报告！请尽量详细描述问题。
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行 ...
        2. 点击 ...
        3. 出现错误 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Zep 后端模式
      options:
        - cloud（Zep Cloud）
        - graphiti（本地 Neo4j）
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、Python 版本、Node.js 版本等
      placeholder: |
        - OS: macOS 14.x
        - Python: 3.11.x
        - Node.js: 18.x
    validations:
      required: false
