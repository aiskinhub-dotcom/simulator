name: Feature Request
description: 提出功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 感谢你的功能建议！
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他方案吗？
    validations:
      required: false
